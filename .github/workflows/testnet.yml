name: E2E Testnet

# Déclenché uniquement sur push vers main (jamais sur PRs — consomme des tokens testnet)
on:
  push:
    branches: ["main"]

jobs:
  e2e-testnet:
    runs-on: ubuntu-latest
    # Si les secrets ne sont pas configurés, le fixture pytest.skip() skippera
    # les tests gracieusement (voir tests/test_e2e_testnet.py, fixture testnet_client).
    # Ajouter BINANCE_TESTNET_API_KEY + BINANCE_TESTNET_SECRET_KEY dans
    # Settings → Secrets and variables → Actions du repo GitHub.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run E2E testnet suite
        env:
          BINANCE_TESTNET_API_KEY: ${{ secrets.BINANCE_TESTNET_API_KEY }}
          BINANCE_TESTNET_SECRET_KEY: ${{ secrets.BINANCE_TESTNET_SECRET_KEY }}
          # Vars obligatoires pour bot_config.Config.from_env()
          BINANCE_API_KEY: ${{ secrets.BINANCE_TESTNET_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_TESTNET_SECRET_KEY }}
          SENDER_EMAIL: ci@testnet.local
          RECEIVER_EMAIL: ci@testnet.local
          GOOGLE_MAIL_PASSWORD: ci_testnet_dummy
          BOT_MODE: LIVE
        run: |
          python -m pytest tests/test_e2e_testnet.py -m testnet -v --tb=short
